version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: valoscrim-db
    restart: always
    environment:
      POSTGRES_DB: valoscrim
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # RabbitMQ with STOMP enabled
  rabbitmq:
    image: rabbitmq:3-management
    container_name: valoscrim-rabbit
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"   # AMQP (Rank Sync)
      - "15672:15672" # Dashboard
      - "61613:61613" # STOMP (WebSockets)
    command: /bin/bash -c "rabbitmq-plugins enable --offline rabbitmq_stomp && rabbitmq-server"

  # Spring Boot API
  backend:
    build: ./backend
    container_name: valoscrim-api
    restart: always
    depends_on:
      - db
      - rabbitmq
    ports:
      - "8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/valoscrim
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - HENRIK_API_KEY=${HENRIK_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}

  nginx:
    image: nginx:alpine
    container_name: valoscrim-nginx
    restart: always
    depends_on:
    - backend
    ports:
    - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf


volumes:
  postgres_data: